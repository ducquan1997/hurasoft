<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="/images/favicon_audio.png" type="image/x-icon" />
  <title>DEMO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css" />

  <!-- TAILWIND CSS V3 -->
  <script src="https://cdn.tailwindcss.com"></script> <!-- Tailwind CDN -->
  <script data-type="config/tailwindcss"> 
    // Tailwind Extend Config: thêm các hình class mới tại đây [https://v3.tailwindcss.com/docs/installation]
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'xs': '376px',
            'sm': '576px',
            '3xl': '1600px',
          },
          colors: {
            'primary': '#ff5636',
            'secondary': '#002023',
            'tertiary': '004147',
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #ff5636;
      --color-secondary: #002023;
      --color-tertiary: #004147;
    }
    @layer base {
      html{font-family:Roboto,sans-serif}
      body{word-break:break-word}
      td,th{border:revert-layer;padding:revert-layer}
      a{-webkit-transition:all .2s;-o-transition:all .2s;transition:all .2s}
      a:hover{color:var(--color-primary)}
      button{-webkit-transition:all .2s;-o-transition:all .2s;transition:all .2s;cursor:pointer}
      input{outline-color:var(--color-primary);max-width:100%}
      textarea{outline-color:var(--color-primary);max-width:100%}
      select{outline-color:var(--color-primary);-webkit-appearance:menulist-button}
      @media (max-width:576px){
        input[type=email]:focus,input[type=password]:focus,input[type=text]:focus,select:focus,textarea:focus{font-size:1rem!important}
      }
    }
  </style>

  <!-- STYLE -->
  <link rel="stylesheet" href="./css/fancybox.css" />
  <link rel="stylesheet" href="./css/library.css" />
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="global-header">

  </header>

  <!-- HOMEPAGE -->
  <div class="homepage">

  </div>

  <!-- BREADCRUMB -->
  <section class="section-breadcrumb routing">
    <div class="container">
      <ol itemscope="" itemtype="http://schema.org/BreadcrumbList" class="routing-list">
        <li class="routing-link" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem">
          <a href="/" itemprop="item" class="nopad-l">
            <span itemprop="name">Trang chủ</span>
          </a>
          <meta itemprop="position" content="1" />
        </li>
        <li class="routing-link" itemprop="itemListElement" itemscope="" itemtype="http://schema.org/ListItem">
          <a href="/linh-kien-may-tinh" itemprop="item" class="nopad-l">
            <span itemprop="name"> Linh kiện máy tính </span>
          </a>
          <meta itemprop="position" content="2" />
        </li>
      </ol>
    </div>
  </section>

  <!-- CATEGORY PAGE -->
  <div class="product-page hidden">

  </div>

  <!-- DETAIL PAGE -->
  <div class="product-detail-page hidden">

  </div>

  <!-- DEAL PAGE -->
  <div class="deal-page hidden">

  </div>

  <!-- CART PAGE -->
  <div class="cart-page hidden">

  </div>

  <!-- FOOTER -->
  <footer class="global-footer">

  </footer>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script src="./js/fancybox.js"></script>
  <script src="./js/library.js"></script>
  <script src="./js/main.js"></script>
</body>

</html>
