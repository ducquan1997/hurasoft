<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

  <style>
    :root {
      --color-primary: #a88266;
      --color-secondary: #4e4e4e;
      --white: #fff;
      --black: #000;
      --red: #e80000;
      --blue: #0083fd;
      --gray: #a2a2a2;
      --gray-2: #d9d9d9;
      --box-shadow: 0px 1px 6px rgba(0, 0, 0, 0.2)
    }

    html {
      font-size: 14px
    }

    body {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
      color: #000;
      word-break: break-word;
      line-height: 1.3;
      font-weight: 400;
      background-color: #fff;
      letter-spacing: .15px
    }

    .container {
      max-width: 1220px;
      width: 100%;
      padding: 0 10px;
      margin: 0 auto
    }
  </style>

  <style>
    .cart-page .form {
      padding: 15px 15px 7px;
      -webkit-box-shadow: 0 1px 5px rgba(0, 0, 0, .3);
      box-shadow: 0 1px 5px rgba(0, 0, 0, .3);
      max-width: 600px;
      margin: 150px auto 0
    }

    .cart-page .form-select {
      position: relative;
      color: #288ad6
    }

    .cart-page .form-select-input {
      display: block;
      width: 100%;
      height: 38px;
      font-size: 14px;
      line-height: 38px;
      border: 1px solid #dedede;
      border-radius: 5px;
      outline-color: #288ad6;
      padding: 0 10px;
      margin-bottom: 8px;
    }

    .cart-page .form-select-input.focus-show:focus-within+.form-select-list {
      display: block
    }

    .cart-page .form-select-input.invalid {
      pointer-events: none
    }

    .cart-page .form-select-input::-webkit-input-placeholder {
      color: #288ad6;
      font-size: inherit
    }

    .cart-page .form-select-input::-moz-placeholder {
      color: #288ad6;
      font-size: inherit
    }

    .cart-page .form-select-input:-ms-input-placeholder {
      color: #288ad6;
      font-size: inherit
    }

    .cart-page .form-select-input::-ms-input-placeholder {
      color: #288ad6;
      font-size: inherit
    }

    .cart-page .form-select-input::placeholder {
      color: #288ad6;
      font-size: inherit
    }

    .cart-page .form-select-list {
      width: 100%;
      overflow: auto;
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 10;
      -webkit-box-shadow: 0 0 3px 0 #ccc;
      box-shadow: 0 0 3px 0 #ccc;
      background: #fff;
      border-radius: 5px;
      display: none
    }

    .cart-page .form-select-search {
      position: relative;
      margin: 10px
    }

    .cart-page .form-select-search-result {
      max-height: 200px;
      overflow: auto;
      gap: 1px
    }

    .cart-page .form-select-search-result .item {
      padding: 6px 10px
    }

    .cart-page .form-select-search-result .item.active,
    .cart-page .form-select-search-result .item:hover {
      background: #288ad6;
      color: #fff;
      cursor: pointer
    }

    .cart-page .form-select-icon {
      position: absolute;
      top: 50%;
      right: 10px;
      -webkit-transform: translateY(-50%);
      -ms-transform: translateY(-50%);
      transform: translateY(-50%);
      font-size: 14px
    }

    .style-scroll-3::-webkit-scrollbar-track {
      background-color: #fff
    }

    .style-scroll-3::-webkit-scrollbar {
      width: 4px;
      background-color: #fff
    }

    .style-scroll-3::-webkit-scrollbar-thumb {
      background-color: #cecece
    }
  </style>
</head>

<body>
  <div class="cart-page">
    <div class="container">
      <form action="" class="form">
        <div class="row">
          <div class="col-6">
            <div class="form-select">
              <i class="fa fa-caret-down form-select-icon"></i>
              <input type="text" id="js-customer-province" name="user_info[province]" placeholder="Chọn Tỉnh/Thành phố"
                autocomplete="off" class="form-select-input js-input-primary" onclick="showProvinceContent(this);" />

              <div class="form-select-list" id="js-customer-province-list">
                <div class="form-select-search">
                  <input type="text" onkeyup="searchProvinceHandler(this)" placeholder="Tìm nhanh" autocomplete="off"
                    class="form-select-input" />
                  <i class="fa fa-search form-select-icon"></i>
                </div>

                <ul class="form-select-search-result list grid grid--2-cols gap-0 style-scroll-3"
                  id="js-search-province-result">
                  <li class="item" onclick="getProvinceList(this, 'province', '#js-search-district-result');"
                    data-key="1">Hà Nội</li>
                  <li class="item" onclick="getProvinceList(this, 'province', '#js-search-district-result');"
                    data-key="2">TP HCM</li>
                  <li class="item" onclick="getProvinceList(this, 'province', '#js-search-district-result');"
                    data-key="3">Hải Phòng</li>
                </ul>
              </div>
            </div>
          </div>

          <div class="col-6">
            <div class="form-select">
              <input type="text" id="js-customer-district" name="user_info[district]" placeholder="Chọn Quận/Huyện"
                autocomplete="off" class="form-select-input js-input-primary" onclick="showProvinceContent(this);" />
              <i class="fa fa-caret-down form-select-icon"></i>

              <div class="form-select-list" id="js-customer-district-list">
                <div class="form-select-search">
                  <input type="text" onkeyup="searchProvinceHandler(this)" placeholder="Tìm nhanh" autocomplete="off"
                    class="form-select-input invalid" />
                  <i class="fa fa-search form-select-icon"></i>
                </div>

                <ul class="form-select-search-result list grid grid--2-cols gap-0 style-scroll-3"
                  id="js-search-district-result">
                  <li class="item text-center mb-2" style="grid-column:span 2;pointer-events:none">
                    Bạn chưa chọn Tỉnh/Thành phố
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <div class="col-6">
            <div class="form-select">
              <input type="text" id="js-customer-ward" name="user_info[ward]" placeholder="Chọn Phường/Xã"
                autocomplete="off" class="form-select-input js-input-primary" onclick="showProvinceContent(this);" />
              <i class="fa fa-caret-down form-select-icon"></i>

              <div class="form-select-list" id="js-customer-ward-list">
                <div class="form-select-search">
                  <input type="text" onkeyup="searchProvinceHandler(this)" placeholder="Tìm nhanh" autocomplete="off"
                    class="form-select-input invalid" />
                  <i class="fa fa-search form-select-icon"></i>
                </div>

                <ul class="form-select-search-result list grid grid--2-cols gap-0 style-scroll-3"
                  id="js-search-ward-result">
                  <li class="item text-center mb-2" style="grid-column:span 2;pointer-events:none">
                    Bạn chưa chọn Quận/Huyện
                  </li>
                </ul>
              </div>
            </div>
          </div>

        </div>
      </form>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>

  <script>
    $(document).ready(function () {
      clickOutSideCloseProvinceContent();
    })

    function showProvinceContent(_this) {
      const $target = $(_this).closest(".form-select").find(".form-select-list");

      if (!$target.hasClass('onSelect')) {
        $(".form-select-list").hide().removeClass("onSelect");
        $target.fadeIn().addClass("onSelect");
      }
    }

    function clickOutSideCloseProvinceContent() {
      $(document).on("click", function (e) {
        const $container = $(".form-select");
        const $target = $(".form-select-list");

        if (!$container.is(e.target) && $container.has(e.target).length === 0) $target.hide().removeClass("onSelect");
      })
    }

    function searchProvinceHandler(_this) {
      const $search_list = $(_this).closest('.form-select-list').find('.form-select-search-result .item');
      const search_value = convertToSlug($(_this).val().toLowerCase().trim());

      if (search_value) {
        $search_list.each(function () {
          const $search_text = convertToSlug($(this).text().toLowerCase().trim());

          if ($search_text.indexOf(search_value) > -1) $(this).show();
          else $(this).hide();
        })
      } else $search_list.show()
    }

    // HURA 8
    function getProvinceList(_this, type, target) {
      let params;
      let next_type = '';
      let next_target = '';
      const id = parseInt($(_this).attr('data-key'));
      const text = $(_this).text().trim();
      const $input = $(_this).closest('.form-select').find('.js-input-primary');
      const $input_invalid = $(target).closest('.form-select').find('.form-select-input.invalid');
      const $input_target = $(target).closest('.form-select').find('.js-input-primary');

      $input.val(text);
      $input_target.val('');
      $input_invalid.removeClass('invalid');
      $('body').click();

      if (type === 'province') {
        params = { action_type: 'district-list', province: id };
        next_type = 'district';
        next_target = '#js-search-ward-result';

        $(next_target).html(`<li class="item text-center mb-2" style="grid-column:span 2;pointer-events:none">Bạn chưa chọn Quận/Huyện</li>`);
        $(next_target).closest('.form-select').find('.js-input-primary').val('');
        $(next_target).closest('.form-select').find('.form-select-search .form-select-input').addClass('invalid');
      }
      else if (type === 'district') params = { action_type: 'ward-list', district: id };
      else return;

      Hura.Ajax.get("province", params).then(function (data) {
        //console.log(data);
        let html_tpl = '';
        data.forEach(function (item) {
          html_tpl += `<li class="item" onclick="getProvinceList(this, '${next_type}', '${next_target}');" data-key="${item.id}">${item.name}</li>`;
        })
        $(target).html(html_tpl);
      })
    }

    function restoreSeachProvinceContent() {
      $('.form-select-search-result .item').show();
      $('.form-select-search input').val('');
    }

    function convertToSlug(e) {
      let r = e;
      return r
        .toLowerCase()
        .replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a")
        .replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e")
        .replace(/ì|í|ị|ỉ|ĩ/g, "i")
        .replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o")
        .replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u")
        .replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y")
        .replace(/đ/g, "d")
        .replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, "")
        .replace(/\u02C6|\u0306|\u031B/g, "")
        .replace(/[^\w ]+/g, "")
        .replace(/ +/g, "-");
    }
  </script>
</body>

</html>
