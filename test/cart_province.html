<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

  <style>
    :root {
      --color-primary: #a88266;
      --color-secondary: #4e4e4e;
      --white: #fff;
      --black: #000;
      --red: #e80000;
      --blue: #0083fd;
      --gray: #a2a2a2;
      --gray-2: #d9d9d9;
      --box-shadow: 0px 1px 6px rgba(0, 0, 0, 0.2);
    }

    html {
      font-size: 14px;
    }

    body {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
      color: #000;
      word-break: break-word;
      line-height: 1.3;
      font-weight: 400;
      background-color: #fff;
      letter-spacing: 0.15px;
    }

    *,
    ::after,
    ::before {
      padding: 0;
      margin: 0;
      -webkit-box-sizing: inherit;
      box-sizing: inherit;
    }

    .container {
      max-width: 1220px;
      width: 100%;
      padding: 0 10px;
      margin: 0 auto;
    }
  </style>

  <style>
    .cart-page .form {
      padding: 15px;
      -webkit-box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      margin: 150px auto 0;
    }

    .cart-page .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .cart-page .form-select {
      position: relative;
    }

    .cart-page .form-select-input {
      display: block;
      width: 100%;
      height: 38px;
      font-size: 14px;
      line-height: 38px;
      border: 1px solid #dedede;
      border-radius: 5px;
      outline-color: #288ad6;
      padding: 0 10px;
    }

    .cart-page .form-select-input.focus-show:focus-within+.form-select-list {
      display: block;
    }

    .cart-page .form-select-input.invalid {
      pointer-events: none;
    }

    .cart-page .form-select-list {
      width: 100%;
      overflow: auto;
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 10;
      -webkit-box-shadow: 0 0 3px 0 #ccc;
      box-shadow: 0 0 3px 0 #ccc;
      background: #fff;
      border-radius: 5px;
      display: none;
    }

    .cart-page .form-select-search {
      position: relative;
      margin: 10px;
    }

    .cart-page .form-select-search-result {
      max-height: 200px;
      overflow: auto;
    }

    .cart-page .form-select-search-result .item {
      padding: 6px 10px;
      color: #288ad6;
      border-top: 1px solid #fff;
      cursor: pointer;
    }

    .cart-page .form-select-search-result .item.selected,
    .cart-page .form-select-search-result .item:hover {
      background: #288ad6;
      color: #fff;
    }

    .cart-page .form-select-search-result .item.selected {
      pointer-events: none;
    }

    .cart-page .form-select-icon {
      position: absolute;
      top: 50%;
      right: 10px;
      -webkit-transform: translateY(-50%);
      -ms-transform: translateY(-50%);
      transform: translateY(-50%);
      font-size: 14px;
    }

    .style-scroll-3::-webkit-scrollbar-track {
      background-color: #fff;
    }

    .style-scroll-3::-webkit-scrollbar {
      width: 4px;
      background-color: #fff;
    }

    .style-scroll-3::-webkit-scrollbar-thumb {
      background-color: #cecece;
    }
  </style>
</head>

<body>
  <div class="cart-page">
    <div class="container">
      <form action="" class="form">
        <div class="form-row">
          <div class="form-col">
            <div class="form-select">
              <svg class="form-select-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512" width="9" height="15">
                <path
                  d="M140.3 376.8c12.6 10.2 31.1 9.5 42.8-2.2l128-128c9.2-9.2 11.9-22.9 6.9-34.9S301.4 192 288.5 192l-256 0c-12.9 0-24.6 7.8-29.6 19.8S.7 237.5 9.9 246.6l128 128 2.4 2.2z" />
              </svg>
              <input class="form-select-input js-input-primary" id="js-customer-province" type="text" name="user_info[province]" placeholder="Chọn Tỉnh/Thành phố"
                autocomplete="off" readonly />

              <div class="form-select-list" id="js-customer-province-list">
                <div class="form-select-search">
                  <input class="form-select-input js-input-search" type="text" placeholder="Tìm nhanh" autocomplete="off" />
                  <svg class="form-select-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="14" height="14">
                    <path
                      d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376C296.3 401.1 253.9 416 208 416 93.1 416 0 322.9 0 208S93.1 0 208 0 416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" />
                  </svg>
                </div>

                <ul class="form-select-search-result" id="js-search-province-result">
                  <li class="item" onclick="cartProvinceAjax(this, 'province', '#js-search-district-result');" data-key="1">Hà Nội</li>
                  <li class="item" onclick="cartProvinceAjax(this, 'province', '#js-search-district-result');" data-key="2">TP HCM</li>
                  <li class="item" onclick="cartProvinceAjax(this, 'province', '#js-search-district-result');" data-key="3">Hải Phòng</li>
                </ul>
              </div>
            </div>
          </div>

          <div class="form-col">
            <div class="form-select">
              <input class="form-select-input js-input-primary" id="js-customer-district" type="text" name="user_info[district]" placeholder="Chọn Quận/Huyện" autocomplete="off"
                readonly />
              <svg class="form-select-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512" width="9" height="15">
                <path
                  d="M140.3 376.8c12.6 10.2 31.1 9.5 42.8-2.2l128-128c9.2-9.2 11.9-22.9 6.9-34.9S301.4 192 288.5 192l-256 0c-12.9 0-24.6 7.8-29.6 19.8S.7 237.5 9.9 246.6l128 128 2.4 2.2z" />
              </svg>

              <div class="form-select-list" id="js-customer-district-list">
                <div class="form-select-search">
                  <input class="form-select-input invalid js-input-search" type="text" placeholder="Tìm nhanh" autocomplete="off" />
                  <svg class="form-select-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="14" height="14">
                    <path
                      d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376C296.3 401.1 253.9 416 208 416 93.1 416 0 322.9 0 208S93.1 0 208 0 416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" />
                  </svg>
                </div>

                <ul class="form-select-search-result" id="js-search-district-result">
                  <li class="item text-center" style="grid-column: span 2;margin-bottom: 8px;pointer-events: none;">Bạn chưa chọn Tỉnh/Thành phố</li>
                </ul>
              </div>
            </div>
          </div>

          <div class="form-col">
            <div class="form-select">
              <input class="form-select-input js-input-primary" id="js-customer-ward" type="text" name="user_info[ward]" placeholder="Chọn Phường/Xã" autocomplete="off" readonly />
              <svg class="form-select-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512" width="9" height="15">
                <path
                  d="M140.3 376.8c12.6 10.2 31.1 9.5 42.8-2.2l128-128c9.2-9.2 11.9-22.9 6.9-34.9S301.4 192 288.5 192l-256 0c-12.9 0-24.6 7.8-29.6 19.8S.7 237.5 9.9 246.6l128 128 2.4 2.2z" />
              </svg>

              <div class="form-select-list" id="js-customer-ward-list">
                <div class="form-select-search">
                  <input class="form-select-input invalid js-input-search" type="text" placeholder="Tìm nhanh" autocomplete="off" />
                  <svg class="form-select-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="14" height="14">
                    <path
                      d="M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376C296.3 401.1 253.9 416 208 416 93.1 416 0 322.9 0 208S93.1 0 208 0 416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z" />
                  </svg>
                </div>

                <ul class="form-select-search-result list" id="js-search-ward-result">
                  <li class="item text-center" style="grid-column: span 2;margin-bottom: 8px;pointer-events: none;">Bạn chưa chọn Quận/Huyện</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>

  <script>
    $(document).ready(function () {
      cartProvinceHandle();
    });

    // HANDLE
    function cartProvinceHandle() {
      _popupDisplay();
      _popupSearch();
      _popupClose();

      function _popupDisplay(_this) {
        $(".js-input-primary").on("click", function () {
          const $target = $(this).closest(".form-select").find(".form-select-list");

          if (!$target.hasClass("onSelect")) {
            $(".form-select-list").hide().removeClass("onSelect");
            $target.fadeIn().addClass("onSelect");
          }
        })
      }

      function _popupClose() {
        $(document).on("click", function (e) {
          const $container = $(".form-select");
          const $target = $(".form-select-list");

          if (!$container.is(e.target) && $container.has(e.target).length === 0) $target.hide().removeClass("onSelect");
        });
      }

      function _popupSearch() {
        $(".js-input-search").on("keyup", debounce(function () {
          const $search_list = $(this).closest(".form-select-list").find(".form-select-search-result .item");
          const search_value = convertToSlug($(this).val().toLowerCase().trim());

          if (search_value) {
            $search_list.each(function () {
              const $search_text = convertToSlug($(this).text().toLowerCase().trim());

              if ($search_text.indexOf(search_value) > -1) {
                $(this).show();
                return;
              }

              $(this).hide();
            });

            return;
          }

          $search_list.show();
        }, 500))
      }
    }

    // AJAX
    function cartProvinceAjax(_this, type, target) {
      const text = $(_this).text().trim();
      const $input = $(_this).closest(".form-select").find(".js-input-primary");
      $input.val(text);

      const $target_form = $(target).closest(".form-select");
      const $target_input = $target_form.find(".js-input-primary");
      const $target_search = $target_form.find(".js-input-search");
      $target_input.val("");
      $target_search.val("").removeClass("invalid");

      const $options = $(_this).closest(".form-select-search-result").find(".item");
      $options.removeClass("selected");
      $(_this).addClass("selected");
      $("body").click();

      let params = null, next_type = "", next_target = "";
      const id = $(_this).attr("data-key");

      if (type === "province") {
        params = { action_type: "district-list", province: id };
        next_type = "district";
        next_target = "#js-search-ward-result";

        $(next_target).html(`<li class="item text-center mb-2" style="grid-column:span 2;margin-bottom: 8px;pointer-events: none;">Bạn chưa chọn Quận/Huyện</li>`);
        $(next_target).closest(".form-select").find(".js-input-primary").val("");
        $(next_target).closest(".form-select").find(".form-select-search .form-select-input").addClass("invalid");
      }

      if (type === "district") {
        params = { action_type: "ward-list", district: id };
      }

      if (!params) {
        return
      }

      Hura.Ajax.get("province", params).then(function (data) {
        const html = data.map((item) => `<li class="item" onclick="cartProvinceAjax(this, '${next_type}', '${next_target}');" data-key="${item.id}">${item.name}</li>`).join("");
        $(target).html(html);
      });
    }

    // ULTIES
    function convertToSlug(e) {
      let r = e;
      return r
        .toLowerCase()
        .replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a")
        .replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e")
        .replace(/ì|í|ị|ỉ|ĩ/g, "i")
        .replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o")
        .replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u")
        .replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y")
        .replace(/đ/g, "d")
        .replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, "")
        .replace(/\u02C6|\u0306|\u031B/g, "")
        .replace(/[^\w ]+/g, "")
        .replace(/ +/g, "-");
    }

    function debounce(a, b, c) {
      var d;
      return function () {
        var e = this,
          f = arguments,
          g = c && !d;
        clearTimeout(d),
          (d = setTimeout(function () {
            (d = null), c || a.apply(e, f);
          }, b)),
          g && a.apply(e, f);
      };
    }
  </script>
</body>

</html>
