<div class="product-spec-featured" id="js-product-spec-featured">

    Thông số nổi bật

<script>
  function getProTechSpecFeatured() {
    const target = "#js-product-spec-featured-list";
    const cat_id = "{$product_info.categoryInfo.0.id}";
    const raw = `{$product_info.productTechnicalRaw|json_encode}`;
    if (!raw || !cat_id) return;

    const data = JSON.parse(raw);
    const names = Object.values(data["attribute-name"]);
    const values = Object.values(data["attribute-value"]);

    if (values.length === 0) return;

    const specs = names.map(attr => {
      const value_id = data["attribute-value"][attr.id][0].id;
      const value_name = data["attribute-value"][attr.id][0].name;

      return { name: attr.name, image: attr.comment, value_id: value_id, value_name: value_name };
    })

    $.getJSON("/ajax/get_json.php", {
      action: "category",
      action_type: "filter",
      id: cat_id
    }, function (result) {
      const catFilter = result.filter;
      if (catFilter.length === 0) return;

      const html = specs.map(spec => {
        const specFilter = catFilter.filter(flt => flt.attributeName === spec.name)[0].filterList;
        const specIndex = specFilter.findIndex(flt => flt.id === spec.value_id);
        if (specIndex === -1) return;

        const specProGroup =
          specFilter.length < 4 ? specFilter :
            specIndex === 0 ? specFilter.slice(specIndex, specIndex + 3) :
              specIndex === specFilter.length - 1 ? specFilter.slice(specIndex - 3, specIndex) : specFilter.slice(specIndex - 1, specIndex + 2); //>

        const specSelectedIcon = `
          <svg xmlns="http://www.w3.org/2000/svg" width="7" height="6" viewBox="0 0 7 6" fill="#000" class="psft-group-icon">
            <path d="M3.83606 0.00976562L6.98227 5.33502H0.689846L3.83606 0.00976562Z" fill="inherit"></path>
          </svg>
        `;

        const specGlobalImage = spec.image ? `<i class="psft-group-image" style="background-image: url(${spec.image});"></i>` : "";

        const specProGroupHTML = specProGroup.map(item => `
          <div class="psft-group-item ${item.id === spec.value_id ? 'active' : ''}">
            ${specGlobalImage}
            <p>${item.name}</p>
            ${item.id === spec.value_id ? specSelectedIcon : ''}
          </div>
        `).join("");

        return `
          <div class="product-spec-featured-item">
            <div class="psft-info">
              <p class="psft-label">${spec.name}</p>
              <p class="psft-value">${spec.value_name}</p>
            </div>
            <div class="psft-group">
              ${specProGroupHTML}
            </div>
          </div>
  		  `;
      }).join("");

      $(target).html(html);
    });
  }
</script>
