<!-- BUILD-PC VARIANT POPUP -->
<div id="js-buildpc-variant-popup" class="buildpc-variant-popup">
  <div class="bvp-container">
    <div class="bvp-info">
      <img src="{{ global.domain }}{{ global.settings.logo_file }}" alt="{{ global.domain }}" width="150" height="150"
        id="js-product-image" class="bvp-image">
      <h3 class="bvp-name">
        <p id="js-product-name"></p>
        <p id="js-variant-name" style="color: var(--color-primary);"></p>
      </h3>
      <p id="js-variant-price" class="bvp-price"></p>
    </div>

    <div id="js-bvp-config" class="bvp-config">
      <!--Ajax holder-->
    </div>

    <div id="js-config-alert" class="bvp-alert">
      Cấu hình không có sẵn. Quý khách vui lòng tham khảo cấu hình, sản phẩm khác hoặc Liên hệ với cửa hàng để được tư vấn thêm.
    </div>

    <div class="bvp-button">
      <button type="button" class="bvp-btn cancel" onclick="$('#js-buildpc-variant-popup').fadeOut();">
        Hủy bỏ
      </button>
      <button type="button" class="bvp-btn submit" id="js-bvp-btn-submit" data-id="" data-variant-id=""
        onclick="BuildPCVisual.addProductVariantToList(this);">
        Xác nhận
      </button>
    </div>
  </div>
  <div id="js-bvp-bg" class="bvp-bg" onclick="$('#js-buildpc-variant-popup').fadeOut();"></div>
</div>

<script>
  // BUILD PC PRO CONFIG CREATE
  function configProductPopupOpen(_this) {
    const product_raw = $(_this).attr("data-info");
    const product_info = JSON.parse(product_raw);

    localStorage.setItem("buildpc_variant_popup", product_raw);

    $("#js-buildpc-variant-popup").fadeIn();
    $("#js-product-name").html(product_info.name);
    $("#js-product-image").attr({ "src": product_info.image, "alt": product_info.name, "orginal": product_info.image });
    $("#js-bvp-btn-submit").attr("data-id", product_info.id);

    configProductHanler(product_info.variant_attributes, product_info.variant_list);
  }

  // BUILD PC PRO CONFIG POPUP
  function configProductPopup(id) {
    Hura.Ajax.get("product", { action_type: "basic-info", id: id }).then(function (data) {
      const target = '.btn-buy[data-id="' + id + '"]';
      const strings = data.variant_built.match(/\x3Cscript type='hura8\/tpl'>(.*)\x3C\/script>/).pop();
      const variants = JSON.parse(strings);
      if (variants.length === 0) return;

      const info = JSON.stringify({
        id: id,
        url: data.productUrl,
        name: data.productName,
        description: data.productSummary,
        image: data.productImage.large,
        sku: data.productSKU,
        warranty: data.warranty,
        variant_attributes: data.variant_option,
        variant_list: variants,
      });

      const prices = variants.map(item => item.sale_price);
      const prices_max = Math.max(...prices);
      const prices_min = Math.min(...prices);
      const prices_range = prices_max === prices_min ? formatCurrency(prices_max) : formatCurrency(prices_min) + " - " + formatCurrency(prices_max);

      $(target).closest(".p-item").find(".p-price").html(prices_range + "đ");
      $(target).removeClass("js-select-product").attr({
        "data-info": info,
        "onclick": "configProductPopupOpen(this)",
        "style": "background-color: #ff981f!important;"
      })
    })
  }

  // CONFIG PRODUCT HANDLER
  function configProductHanler(attributes, list) {
    if (list.length === 0) return;

    _createVariantConfig(attributes); // CREATE CONFIG HTML
    _setVariantConfig(list); // CHANGE CONFIG HANDLER
  }

  // CREATE CONFIG HTML
  function _createVariantConfig(data) {
    let html = '';

    for (let key in data) {
      const attr_name = data[key].label;
      const attr_list = data[key].values;
      const attr_html = attr_list.map((item) => {
        const display = item.image ? `<img src="${item.image}" alt="${item.label}" width="80" height="80" />` : item.label;
        const color = key === "mau-sac" && item.code && !item.image;
        const option = color ? "js-variant-color" : item.image ? "js-variant-image" : "";
        const style = color ? `style="background-color: ${item.code};"` : "";
        return `
          <li class="variant-item js-variant-item ${option}" title="${item.label}" data-label="${item.label}" data-value="${item.label}" ${style}>
            ${display}
          </li>
        `;
      }).join("");

      html += `
        <div class="config-group js-config-group" data-key="${key}">
          <p class="config-title">
            <b class="config-name">${attr_name}</b>
            <b>:</b>
            <b class="config-name-selected js-config-name-selected"></b>
          </p>
          <ul class="config-list">
            ${attr_html}
          </ul>
        </div>
      `;
    }
    $("#js-bvp-config").html(html);

    // FIRST CONFIG CHOSE
    setTimeout(function () {
      $(".js-config-group").find(".js-variant-item:first-child").click();
    }, 100)
  }

  // DISPLAY VARIANT DATA
  function _displayVariantConfig(data) {
    let selected = {};
    $(".js-variant-item.selected").each(function () {
      const key = $(this).closest(".js-config-group").attr("data-key");
      const value = $(this).attr("data-value");
      selected = { ...selected, [key]: value };
    })

    const alert = "#js-config-alert";
    const variant = data.filter(item => Object.entries(selected).sort().toString() === Object.entries(item.attribute).sort().toString())[0];
    if (!variant) {
      $(alert).show();
      return;
    }

    const variant_submit = "#js-bvp-btn-submit";
    const variant_name = variant.label !== "" ? variant.label : Object.values(variant.attribute).join(" - ");
    const variant_image = variant.thumbnail !== "" && variant.thumbnail !== "0" ? "/media/product/250_" + variant.thumbnail : $("#js-product-image").attr("orginal");

    // SET HIDDEN DATA
    $(variant_submit).attr("data-variant-id", variant.id);

    // CHANGE DISPLAY CONFIG
    $("#js-variant-name").html(variant_name); // CHANGE NEW NAME
    $("#js-variant-price").html(formatCurrency(variant.sale_price) + "đ"); // CHANGE NEW PRICE
    $("#js-product-image").attr("src", variant_image); // CHANGE NEW IMAGE

    // ARLET NO STOCK QUANTITY
    if (variant.stock_quantity == 0) {
      $(alert).fadeIn();
      $(variant_submit).addClass("disable");
      return;
    }

    $(alert).hide();
    $(variant_submit).removeClass("disable");
  }

  // SET VARIANT DATA
  function _setVariantConfig(data) {
    $(".js-variant-item").on("click", function () {
      const $variant_group = $(this).closest(".js-config-group");
      const variant_name = $(this).attr("data-label");

      $variant_group.find(".js-config-name-selected").html(variant_name);
      $variant_group.find(".js-variant-item").removeClass("selected");
      $(this).addClass("selected");
      setTimeout(_displayVariantConfig(data), 100);
    })
  }
</script>
