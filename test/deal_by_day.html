<!-- HTML/CSS -->
<style>
  .flash-sale{margin:42px 0 24px;position:relative}
  .flash-sale .category-container{width:100%!important;max-width:1200px;margin:0 auto;padding-top:42px;background-color:#cb1c22;border:2px solid #cb1c22;border-radius:6px;-webkit-box-shadow:0 4px 4px 0 #00000040;box-shadow:0 4px 4px 0 #00000040}
  .flash-sale-product{background-color:#fff}
  .flash-sale-title{width:100%;height:62px;text-align:center;position:absolute;content:"";top:-18px;left:50%;-webkit-transform:translateX(-50%);-ms-transform:translateX(-50%);transform:translateX(-50%)}
  .flash-sale-title-time{position:absolute;content:"";top:14px;right:166px;display:flex;gap:16px}
  .flash-sale-title-time-effective{padding:5px 20px 5px;background:-o-linear-gradient(top,#ffffe0 0,#f7bd73 100%);background:-webkit-gradient(linear,left top,left bottom,color-stop(0,#ffffe0),to(#f7bd73));background:linear-gradient(180deg,#ffffe0 0,#f7bd73 100%);background-blend-mode:color-burn,normal;-webkit-box-shadow:0 2px 2px rgba(0,0,0,.25);box-shadow:0 2px 2px rgba(0,0,0,.25);border-radius:32px;border:2px solid #fff;font-family:"Sharp Sans";font-size:23px;line-height:1;color:#cb1c22;font-weight:700;text-shadow:.64673px .64673px 0 rgba(255,255,255,.8);cursor:pointer}
  .flash-sale__banner{background-color:#cb1c22}
  .flash-sale-inner{border-radius:0 0 6px 6px;overflow:hidden}
  .flash-sale-inner .left{width:100%;display:-webkit-box;display:-ms-flexbox;display:flex;max-width:784px}
  .flash-sale-inner .right{white-space: nowrap;-webkit-box-flex:1;-ms-flex:1;flex:1;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;padding-right:16px;-webkit-box-pack:end;-ms-flex-pack:end;justify-content:flex-end}
  .flash-sale-inner .right .label{font-size:16px;line-height:1;font-weight:500;color:#fff;margin-right:8px}
  .flash-sale-timeline{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;border-top:1px solid #fffFFF80;border-bottom:1px solid #fffFFF80}
  .flash-sale-item{width:25%;text-align:center;background-color:#444b52;border-right:1px solid #cbd1d6;cursor:pointer}
  .flash-sale-item p{font-size:14px;line-height:1;font-weight:500}
  .flash-sale-item.now{background-color:#444b52}
  .flash-sale-item.now .ripple{display:-ms-grid;display:grid}
  .flash-sale-item.now .flash-sale-block{padding:12px 6px}
  .flash-sale-item.comming{background-color:#444b52}
  .flash-sale-item.comming .flash-sale-day-text{background-color:#bd1319}
  .flash-sale-item.time-out{background-color:#6a737a}
  .flash-sale-item.active{background-color:#cb1c22}
  .flash-sale-block{padding:12px 10px;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;-webkit-box-align:center;-ms-flex-align:center;align-items:center}
  .flash-sale-day{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;-webkit-box-align:center;-ms-flex-align:center;align-items:center;font-size:20px;line-height:28px;font-weight:500;color:#fff}
  .flash-sale-day-text{display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;-webkit-box-align:center;-ms-flex-align:center;align-items:center;padding:4px 8px;margin-left:8px;background:#bd1319;border-radius:4px;font-size:14px;line-height:1;font-weight:500;color:#fff;position:relative}
  .flash-sale-item.active .flash-sale-day-text{color:#cb1c22;background:-o-radial-gradient(56.52% 31.19%,68.81% 68.81%,#fdeeae 0,#e9a025 100%);background:radial-gradient(68.81% 68.81% at 56.52% 31.19%,#fdeeae 0,#e9a025 100%)}
  .flash-sale-day span{white-space:nowrap;font-weight:500}
  .flash-sale-unable{position:absolute;z-index:5;top:50%;left:50%;transform:translate(-50%,-50%);opacity:1;padding:8px 10px;background:#bd1319;border-radius:4px;font-size:18px;line-height:1;font-weight:500;color:#fff;width:max-content}
  .flash-sale .category-container::before{position:absolute;content:"";border-bottom:17px solid #610003;border-left:5px solid transparent;border-right:5px solid transparent;height:0;width:952px;top:-16px;left:50%;-webkit-transform:translateX(-50%);-ms-transform:translateX(-50%);transform:translateX(-50%)}
  .flash-sale .countdown{display:-webkit-box;display:-ms-flexbox;display:flex;gap:8px}
  .flash-sale .countdown .item{position:relative;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;-ms-flex-line-pack:center;align-content:center;min-width:32px;padding:4px;font-size:16px;line-height:1;color:#cb1c22;background-color:#fff;border-radius:4px}
  .flash-sale .countdown .item:not(:last-child)::before{position:absolute;content:":";top:50%;right:-6px;-webkit-transform:translateY(-50%);-ms-transform:translateY(-50%);transform:translateY(-50%);color:#fff}
  .flash-sale .viewrule{display:-webkit-box;display:-ms-flexbox;display:flex;position:relative;font-size:16px;line-height:1;color:#fff;cursor:pointer;margin-left:20px;text-decoration:underline}
  .flash-sale .viewrule::before{position:absolute;content:"|";top:50%;left:-10px;-webkit-transform:translateY(-50%);-ms-transform:translateY(-50%);transform:translateY(-50%);color:#fff}
  .flash-sale .viewrule i{display:block;margin-left:8px;height:16px}
  .flash-sale .viewrule i::before{line-height:16px}
</style>

<div class="flash-sale gold-time" id="js-flash-sale" style="display: none;">
  <div class="category-container">
    <div class="flash-sale-title">
      <div class="flash-sale-title-time" id="js-flash-sale-title-time">
        <!-- holder -->
      </div>
    </div>
    <div class="flash-sale-inner">
      <div class="flash-sale-timeline">
        <div class="left" id="js-flash-sale-days">
          <!-- holder -->
        </div>
        <div class="right">
          <div class="label" id="js-flash-sale-condition">Kết thúc trong</div>
          <div class="countdown" id="js-flash-sale-countdown">
            <div class="item">99</div>
            <div class="item">99</div>
            <div class="item">99</div>
          </div>
          <a href="/deal" class="viewrule">Xem tất cả<i class="icon-right-dir"></i></a>
        </div>
      </div>

      <div class="flash-sale-product grid grid--4-cols p-3" id="js-flash-sale-product">
        <!-- holder -->
      </div>
    </div>
  </div>
</div>

<!-- SCRIPT -->
{% raw %}
<script>
  const deal_new_tpl = `
    <div class="p-item" style="position: relative;">
      {% if (item.deal_time_happen < 0) { %}<div class="flash-sale-unable">Sắp diễn ra {%= dealNew.style(item.from_time.split(", ")[1]) %}</div>{% } %}
      
      <div class="p-wrapper" {% if (item.deal_time_happen < 0) { %}style="opacity: 0.5;pointer-events: none;"{% } %}>
        <div class="p-thumbs">
          <div class="swiper swiper-product-thumbs">
            <div class="swiper-wrapper">
              {% if (item.product_info.imageCollection != null) { %}
              {% for (var i=0; i < item.product_info.imageCollection.length && i < 3; i++) { %}
              <div class="swiper-slide">
                <a href="{%= item.product_info.productUrl %}" class="p-image">
                  <img src="{%= item.product_info.imageCollection[i].image.large %}" alt="{%= item.product_info.productName %}" class="d-flex" />
                </a>
              </div>
              {% } %}
              {% } else { %}
              <div class="swiper-slide">
                <a href="{%= item.product_info.productUrl %}" class="p-image">
                  <img src="{%= item.product_info.productImage.large %}" alt="{%= item.product_info.productName %}" class="d-flex" />
                </a>
              </div>
              {% } %}
            </div>
            <div class="swiper-pagination"></div>
          </div>

          {% if (item.product_info.sale_rules.type == 'deal') { %}
          {% if (item.product_info.marketPrice > item.product_info.price) { %}
          <span class="p-price-sale-off">{%= 100 - Math.trunc(item.product_info.price / item.product_info.marketPrice * 100) %}%</span>
          {% } else { %}
          <span class="p-price-sale-off">{%= 100 - Math.trunc(item.product_info.price / item.product_info.sale_rules.normal_price * 100) %}%</span>
          {% } %}
          {% } %}
        </div>

        <div class="p-info flex-1">
          <a href="{%= item.product_info.productUrl %}">
            <h3 class="p-name line-clamp-2 mt-12px">{%= item.product_info.productName %}</h3>
          </a>
          <p class="p-rating d-flex align-items-center gap-8 my-12px">
            <i class="icon-star star{%= item.product_info.review.rate %}"></i>
            <span class="text-13 font-weight-500">{%= item.product_info.review.total %} bình luận</span>
          </p>
          <p class="p-price">
            <span class="p-price-sale">
              {% if (item.product_info.price > 0) { %}{%= formatCurrency(item.product_info.price) %}₫{% } else { %}Liên hệ{% } %}
            </span>
            <del class="p-price-stock">
              {% if (item.product_info.marketPrice > item.product_info.price) { %}
              {%= formatCurrency(item.product_info.marketPrice) %}₫
              {% } else { %}
              {%= formatCurrency(item.product_info.sale_rules.normal_price) %}₫
              {% } %}
            </del>
          </p>
          <p class="p-quantity my-12px">
            {% if (item.product_info.quantity > 0) { %}
            <i class="static-icons static-icon-green-box"></i> Còn hàng
            {% } else { %}
            <i class="static-icons static-icon-green-box out-stock"></i> <span class="color-red">Hết hàng</span>
            {% } %}
          </p>
        </div>

        <div class="p-wrapper-deal p-relative mt-2">
          <div class="deal-line total"></div>
          <div class="deal-line remaining" style="width: {%= item.sale_remain_percent %}%"></div>
        </div>
        
        <p class="p-quantity p-quantity-deal my-12px">
          <span>Có sẵn <b class="deal-quantity deal-remaint">{%= item.sale_remain %}</b></span>
          <span>Đã bán <b class="deal-quantity deal-sold">{%= item.sale_sold %}</b></span>
        </p>
      </div>  
    </div>
  `;
</script>
{% endraw %}

<script>
  $(document).ready(function () {
    dealNew.setup(4);
  })

  const dealNew = (() => {
    // DEAL VARIANT
    let dl_data = [];
    let dl_interval;
    let dl_countdown = 0;

    // DEAL SETUP
    const _setup = (dl_days) => {
      const params = {
        action_type: "list",
        type: "active",
        show: 50,
      }

      Hura.Ajax.get("deal", params).then(function (data) {
        if (data.list.length === 0) return;

        dl_data = _data(data.list, dl_days);
        const html = dl_data.map((item) => {
          const list = item.date_group.map(d => d.time_group).flat();
          const duration = Math.max(...list.map(pro => pro.deal_time_happen));
          const condition = duration > 0 ? 'Đang diễn ra' : 'Sắp diễn ra';
          const active = duration > 0 ? 'active' : '';
          const date = item.date.split('-')[0] + '/' + item.date.split('-')[1];

          return `
            <div class="flash-sale-item js-flash-sale-item ${active}" onclick="dealNew.date('${item.date}', this);">
              <div class="flash-sale-block">
                <div class="flash-sale-day">
                  <div class="ripple"></div><span>${date}</span>
                </div>
                <div class="flash-sale-day-text">
                  <p>${condition}</p>
                </div>
              </div>
            </div>
          `;
        }).join("");

        $("#js-flash-sale-days").html(html);
        $('.js-flash-sale-item').first().click();
        $('#js-flash-sale').fadeIn();

        _countdown();
      });
    }

    // DEAL DATA
    function _data(list, limited) {
      return _dataDate(list).map(item => {
        return {
          date: item.date,
          date_group: _dataTime(item.date_group)
        }
      });

      function _dataDate(data) {
        const date_new = data.map(function (item) {
          const date = item.from_time.split(", ")[0];
          return { date: date, date_group: item };
        })

        const date_rework = date_new.reduce((agg, curr) => {
          let found = agg.find((x) => x.date === curr.date);
          if (found) found.date_group.push(curr.date_group);
          else agg.push({ date: curr.date, date_group: [curr.date_group] });
          return agg;
        }, []);

        return [...date_rework].sort(function (a, b) {
          return new Date(a.date.split("-").reverse().join("/")) - new Date(b.date.split("-").reverse().join("/"));
        }).slice(0, limited);
      }

      function _dataTime(data) {
        const time_new = data.map(function (item) {
          const from_time = item.from_time.split(", ");
          const end_time = item.to_time.split(", ");
          const time = from_time[1];
          return { time: time, time_group: item };
        })

        const time_rework = time_new.reduce((agg, curr) => {
          let found = agg.find((x) => x.time === curr.time);
          if (found) found.time_group.push(curr.time_group);
          else agg.push({ time: curr.time, time_group: [curr.time_group] });
          return agg;
        }, []);

        return [...time_rework].sort(function (a, b) {
          return parseInt(_style(a.time).replace(":", "")) - parseInt(_style(b.time).replace(":", ""));
        });
      }
    }

    // DEAL RENDER
    function _date(date, _this) {
      const deal_data = dl_data.filter(item => item.date === date)[0].date_group;
      const deal_list = deal_data.map(d => d.time_group).flat();
      const deal_time_left = Math.min(...deal_list.map(pro => pro.deal_time_left));
      const deal_time_happen = Math.max(...deal_list.map(pro => pro.deal_time_happen));
      const deal_time_title = deal_time_happen > 0 ? "Kết thúc sau" : "Bắt đầu sau";
      const deal_time_start = deal_time_happen > 0 ? deal_time_left : Math.abs(deal_time_happen);

      const deal_time_group = deal_data.map(d => {
        const time_sort = [...d.time_group].sort(function (a, b) {
          return parseInt(_style(a.to_time).replace(":", "")) - parseInt(_style(b.to_time).replace(":", ""));
        })
        const time_soon = time_sort[0].to_time.split(", ")[1];
        const time_end = _style(time_soon);
        const time_start = _style(d.time);

        return `
          <button type="button" class="flash-sale-title-time-effective js-flash-sale-time-item" onclick="dealNew.time('${date}', '${d.time}', this);">
            ${time_start} - ${time_end}
          </button>
        `;
      });

      $("#js-flash-sale-title-time").html(deal_time_group);
      $('.js-flash-sale-item').removeClass('active');
      $(_this).addClass('active');

      _render(deal_list, deal_time_start, deal_time_title);
    }

    function _time(date, time, _this) {
      const deal_date = dl_data.filter(item => item.date === date)[0].date_group;
      const deal_list = deal_date.filter(item => item.time === time)[0].time_group;
      const deal_time_left = Math.min(...deal_list.map(pro => pro.deal_time_left));
      const deal_time_happen = Math.max(...deal_list.map(pro => pro.deal_time_happen));
      const deal_time_title = deal_time_happen > 0 ? "Kết thúc sau" : "Bắt đầu sau";
      const deal_time_start = deal_time_happen > 0 ? deal_time_left : Math.abs(deal_time_happen);

      _render(deal_list, deal_time_start, deal_time_title);
    }

    function _render(data, time, title) {
      $("#js-flash-sale-condition").html(title);

      const data_new = data.map(item => {
        const sale_total = parseInt(item.quantity);
        const sale_temp = parseInt(item.sale_quantity);
        const sale_sold = sale_temp > sale_total ? sale_total : sale_temp;
        const sale_remain = sale_total - sale_sold;
        const sale_remain_percent = sale_temp > sale_total ? 0 : sale_remain / sale_total * 100;

        return {
          ...item,
          sale_sold: sale_sold,
          sale_remain: sale_remain,
          sale_remain_percent: sale_remain_percent
        }
      })

      let products = Hura.Template.parse(deal_new_tpl, data_new);
      Hura.Template.render(`#js-flash-sale-product`, products);

      let time_left = time - dl_countdown;
      if (dl_interval) clearInterval(dl_interval);
      dl_interval = setInterval(_timeDown, 1000);

      function _timeDown() {
        time_left--;
        $("#js-flash-sale-countdown").html(_renderTime(time_left));

        if (time_left === 0) {
          clearInterval(dl_interval);
          location.reload();
        }
      }

      function _renderTime(time) {
        const sec = String(time % 60).padStart(2, 0);
        const min = String(Math.trunc((time / 60) % 60)).padStart(2, 0);
        const hour = String(Math.trunc(time / 3600) % 24).padStart(2, 0);
        const day = String(Math.trunc(time / 86400) % 3600).padStart(2, 0);

        return `
          <div class="item">${day}</div> 
          <div class="item">${hour}</div>
          <div class="item">${min}</div>
          <div class="item">${sec}</div>
        `;
      }
    }

    // DEAL COUNTDOWN ALL
    function _countdown() {
      const timer = setInterval(_timerDown, 1000);

      function _timerDown() {
        dl_countdown++;

        if (dl_countdown === 999999) {
          clearInterval(timer);
          location.reload();
        }
      }
    }

    function _style(date) {
      const [time, modifier] = date.split(' ');
      let [hours, minutes] = time.split(':');

      if (hours === '12') hours = '00';
      if (modifier === 'pm') hours = parseInt(hours, 10) + 12;
      return `${hours > 10 ? hours : "0" + hours}:${minutes}`;
    }

    return {
      setup: _setup,
      date: _date,
      time: _time,
      style: _style
    }
  })();
</script>
