<script>
  function globalToggleClick() {
    const targets = [
      {
        holder: "#js-header-cart",
        target: "#js-cart-ttip"
      }
    ];

    targets.forEach((item) => {
      const $holder = $(item.holder);
      const $target = $(item.target);

      $holder.on("click", function () {
        $target.fadeToggle();
      })

      $(document).on("click", function (e) {
        if (!$holder.is(e.target) && $holder.has(e.target).length === 0) $target.fadeOut();
      });
    })
  }
</script>
