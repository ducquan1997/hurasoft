<!-- <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit2"></script>
<script type="text/javascript" src="{{ global.domain }}{{ 'translate.js' | asset_url }}?v=1.0"></script> -->

<script>
  const globalTranslate = (() => {
    const primary = "vi|vi";
    const storage = "googtrans_selected";

    function _setup() {
      if (_check()) return;
      _api();
    }

    function _click(lang) {
      if (_check()) return;

      _api().then(function () {
        doGTranslate(lang);
        localStorage.setItem(storage, lang);
      });
    }

    function _check() {
      const googtrans = localStorage.getItem(storage);
      const selected = googtrans ? googtrans : primary;
      return selected === primary;
    }

    async function _api() {
      const holder = "#google_translate_element2";
      if ($(holder).hasClass("trans-loaded")) return;
      $(holder).addClass("trans-loaded").after(`\x3Cscript src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit2" type="text/javascript">\x3C/script>\x3Cscript src="{{ 'translate.js' | asset_url }}?v=1.0">\x3C/script>`);
    }

    return {
      setup: _setup,
      click: _click
    }
  })();
</script>
