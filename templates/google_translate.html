<script type="text/javascript" src="{{ global.domain }}{{ 'translate.js' | asset_url }}?v=1.0"></script> -->

<script>
  const GlobalTranslate = (() => {
    const _lang_primary = "vi|vi";
    const _lang_storage = "googtrans_selected";

    // setUp
    function _setUp() {
      if (_checkExit()) return;
      _callAPI();
    }

    // change lang
    function _changeLang(lang) {
      if (_checkExit()) return;

      _callAPI().then(function () {
        doGTranslate(lang);
        localStorage.setItem(_lang_storage, lang);
      });
    }

    // check lang exit
    function _checkExit() {
      const lang_store = localStorage.getItem(_lang_storage);
      const lang_selected = lang_store ? lang_store : _lang_primary;
      return lang_selected === _lang_primary;
    }

    // call Google Translate API
    async function _callAPI() {
      const holder = "#google_translate_element2";
      if ($(holder).hasClass("trans-loaded")) return;
      $(holder).addClass("trans-loaded").after(`\x3Cscript src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit2" type="text/javascript">\x3C/script>\x3Cscript src="{{ 'translate.js' | asset_url }}?v=1.0">\x3C/script>`);
    }

    return {
      setUp: _setUp,
      change: _changeLang
    }
  })();
</script>
