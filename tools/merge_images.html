<html lang="en">

<body>
  <div class="container my-10">
    <h1 class="text-3xl font-bold underline text-center text-(--color-primary) mb-8">MERGE IMAGE</h1>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <h2 class="text-2xl font-bold text-center mb-6">Frame, Icons</h2>
        <div class="flex flex-wrap gap-4">
          <img src="/frame.png" alt="Frame" width="500" height="500">
          <img src="/icon-sale-hot-2025.png" alt="Frame" width="80" height="80">
          <img src="/icon-sale-online-2025.png" alt="Frame" width="80" height="80">
          <img src="/icon-freeship-2025.png" alt="Frame" width="80" height="80">
        </div>
      </div>

      <div>
        <h2 class="text-2xl font-bold text-center mb-6">Products</h2>
        <img src="/product.png" alt="Product" width="500" height="500">
      </div>

      <div>
        <h2 class="text-2xl font-bold text-center mb-6">Merge Image</h2>
        <a href="https://placehold.co/500x500" data-fancybox="gallery" id="merge-link">
          <img src="https://placehold.co/500x500" alt="Merge image" width="500" height="500" id="merge-image">
        </a>
      </div>

    </div>

    <div class="text-center mt-10">
      <button class="bg-red-600 text-white py-2 px-5 cursor-pointer" type="button" onclick="downloadBase64AsPng('merge-image-final-'+ Date.now() +'.png');">
        DOWNLOAD MERGE IMAGE
      </button>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.js"></script>

  <script>
    // variant default
    var base64Data = "";
    var iconsData = [
      "/icon-sale-hot-2025.png",
      "/icon-sale-online-2025.png",
      "/icon-freeship-2025.png"
    ];

    // onload function
    $(document).ready(function () {
      mergeImagesHandle();
    });

    // merge image
    function mergeImagesHandle() {
      const frameWidth = 600;
      const iconWidth = 110;
      const iconsList = iconsData.map((icon, index) => {
        const positionBottom = 10;
        const positionLeft = ((index + 1) * 10) + (index * iconWidth);

        return {
          src: icon,
          width: iconWidth,
          height: iconWidth,
          bottom: positionBottom,
          left: positionLeft
        }
      });

      const mergeList = [
        { src: "/product.png", width: frameWidth, height: frameWidth },
        { src: "/frame.png", width: frameWidth, height: frameWidth },
        ...iconsList
      ];

      mergeImages(mergeList).then((b64) => {
        base64Data = b64;
        document.querySelector("#merge-image").src = b64;
        document.querySelector("#merge-link").href = b64;
      });
    }

    // download merge image
    function downloadBase64AsPng(filename = 'image.png') {
      // 1. Convert Base64 to a Blob
      // Assuming base64Data includes the "data:image/png;base64," prefix.
      // If not, you might need to add it or adjust the splitting.
      const parts = base64Data.split(',');
      const mimeType = parts[0].match(/:(.*?);/)[1]; // Extract mime type (e.g., image/png)
      const base64 = parts[1]; // The actual Base64 string

      const byteCharacters = atob(base64); // Decode Base64 string
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      const blob = new Blob([byteArray], { type: mimeType });

      // 2. Create a temporary download link
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;

      // 3. Programmatically click the link to trigger download
      document.body.appendChild(link);
      link.click();

      // 4. Clean up the temporary URL and link
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
  </script>
</body>

</html>
