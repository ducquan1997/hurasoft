<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LẤY LẠI CSS VỀ 1.0 CỦA ICON MAP SAU KHI PHÓNG KÍCH THƯỚC</title>

  <style>
    body {
      background: #dedede;
    }

    i {
      margin: 10px;
    }

    textarea {
      border: 2px solid red;
      width: 100%;
      max-width: 1200px;
      height: 350px;
      padding: 10px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!-- LINK TẠO ICON MAP : CSS Sprite Generator  -->
  <link rel="stylesheet" href="https://spritegen.website-performance.org/">
  <h2 style="display: flex;gap: 40px;">CSS DEFAULT <button onclick="copyClipBoard(this)">Copy css</button></h2>
  <textarea name="" id="final-css-arena" cols="30" rows="10"></textarea>

  <!-- LƯU Ý CLASS ICON GỒM 2 PHẦN : 1.CLASS CHUNG: ví dụ "static-icons"(bắt buộc phải có class chung) + 2.CLASS RIÊNG:"static-icon-black-star" -->
  <!-- KHU VỰC GHI CLASS -->
  <h2>ICON DISPLAY</h2>

  <i class="duyhungcomputer-icons icons-features-new-1"></i>
  <i class="duyhungcomputer-icons icons-features-new-2"></i>
  <i class="duyhungcomputer-icons icons-features-new-3"></i>
  <i class="duyhungcomputer-icons icons-features-new-4"></i>
  <i class="duyhungcomputer-icons icons-features-new-5"></i>
  <i class="duyhungcomputer-icons icons-features-new-6"></i>
  <i class="duyhungcomputer-icons icons-menu-1"></i>

  <!-- KHU VỰC GHI STYLE MẶC ĐỊNH -->
  <style>
    .duyhungcomputer-icons {
      background-image: url(./duyhungcomputer-icons-map-new-1.png);
      background-repeat: no-repeat;
      display: inline-block;
      background-size: 175px 138px;
    }
  </style>

  <style>
    .icons-features-new-1 {
      width: 40px;
      height: 40px;
      background-position: -5px -5px;
    }

    .icons-features-new-2 {
      width: 34px;
      height: 40px;
      background-position: -55px -5px;
    }

    .icons-features-new-3 {
      width: 44px;
      height: 40px;
      background-position: -5px -55px;
    }

    .icons-features-new-4 {
      width: 40px;
      height: 40px;
      background-position: -59px -55px;
    }

    .icons-features-new-5 {
      width: 37px;
      height: 40px;
      background-position: -99px -5px;
    }

    .icons-features-new-6 {
      width: 61px;
      height: 32px;
      background-position: -109px -55px;
    }

    .icons-menu-1 {
      width: 52px;
      height: 36px;
      background-position: -109px -97px;
    }
  </style>

  <!-- SCRIPT -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
  <script>
    $(document).ready(function () {
      getTrueSightIconMap(".duyhungcomputer-icons", 2); // THAY ĐỔI CLASS NAME CHUNG/SIZE PHÓNG TẠI ĐÂY
    })

    // FUNCTION FINAL WITH PARAM: CLASS NAME CHUNG, SIZE PHÓNG ICON
    function getTrueSightIconMap(className, size) {
      const holder = "#final-css-arena";

      if ($(className).length === 0) {
        $(holder).attr('placeholder', 'VUI LÒNG CHỈNH SỬA CLASS CHUNG VÀ SIZE PHÓNG (MẶC ĐỊNH LÀ x2)');
        return;
      }

      const css = $(className).toArray().map((icon) => {
        const classs = $(icon).attr("class").replace(className.substring(1), "").trim();
        const width = Math.ceil(parseInt($(icon).css("width").slice("px")) / size);
        const height = Math.ceil(parseInt($(icon).css("height").slice("px")) / size);

        const bgPosition = $(icon).css("background-position");
        const bgPositionNumber = bgPosition.slice("background-position:").split(" ");
        const bgPositionNumber1 = Math.ceil(parseInt(bgPositionNumber[0]) / size);
        const bgPositionNumber2 = Math.ceil(parseInt(bgPositionNumber[1]) / size);
        const bgPositionFinal = `${bgPositionNumber1}px ${bgPositionNumber2}px`

        return `.${classs}{width:${width}px;height:${height}px;background-position:${bgPositionFinal};}`;
      }).join("");

      $(holder).val(css);
    }

    // COPY CLIPBOARD
    function copyClipBoard(_this) {
      const copyText = document.getElementById("final-css-arena");
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(copyText.value);

      $(_this).html('Copied');
      setTimeout(() => {
        $(_this).html('Copy css');
      }, 3000);
    }
  </script>
</body>

</html>
