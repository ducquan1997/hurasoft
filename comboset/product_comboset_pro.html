<div class="pd-combo" id="js-pd-combo">
  <input type="hidden" id="js-pd-combo-product-main-price" value="{{ page.product_info.price }}">

  <div class="pd-combo-template" id="js-pd-combo-template">
    
    {% for combo_set in page.combo_set %}
    <!-- COMBO {{ combo_set.id }} -->
    <div class="pd-combo-container js-pd-combo-container">
      <!-- TITLE -->
      <h2 class="pd-combo-title">Sản phẩm mua kèm</h2>

      <!-- LIST -->
      <div class="swiper swiper-comboset" id="js-swiper-comboset">
        <div class="swiper-wrapper pd-combo-list js-pd-combo-list">

          {% for category in combo_set.group_list %}
          <div class="swiper-slide pd-combo-wrapper">
            <div class="pd-combo-item js-pd-combo-item" data-comboset-id="{{ combo_set.id }}" data-category-id="{{ category.category_id }}">
              <div class="pd-combo-item-top">
                <div class="pd-combo-item-image">
                  <p class="pd-combo-item-picture">
                    <img class="pd-combo-item-thumbs js-pd-combo-item-thumbs" src="{{ category.image }}" alt="{{ category.title }}" width="250" height="250">
                  </p>
                </div>
                <h3 class="pd-combo-item-title">{{ category.title }}</h3>
              </div>

              <div class="pd-combo-item-bottom">
                <button class="pd-combo-item-btn" type="button" onclick="ComboSetVisual.categoryOpen('{{ combo_set.id }}', '{{ category.category_id }}');">
                  Chọn sản phẩm
                </button>
              </div>
            </div>
          </div>
          {% endfor %}
          
        </div>
        
        <div class="swiper-button-next swiper-custom-btn"></div>
        <div class="swiper-button-prev swiper-custom-btn"></div>
      </div>

      <!-- SUMMARY -->
      <div class="pd-combo-summary">
        <div class="pd-combo-total-price">
          <p>
            Tạm tính: 
            <b class="pd-combo-total-price-number js-pd-combo-total-price-combo">
              {{ page.product_info.price|format_price }}đ
            </b>
          </p>
          <p style="margin-top: 2px;">
            Tiết kiệm: 
            <b class="pd-combo-total-price-number js-pd-combo-total-price-off" style="color: #059669;">
              0đ
            </b>
          </p>
        </div>

        <button class="pd-combo-buy" type="button" onclick="ComboSetVisual.checkout('{{ combo_set.id }}');">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="24" height="24" fill="#e30019"><path d="M0 72C0 58.7 10.7 48 24 48L69.3 48C96.4 48 119.6 67.4 124.4 94L124.8 96L537.5 96C557.5 96 572.6 114.2 568.9 133.9L537.8 299.8C532.1 330.1 505.7 352 474.9 352L171.3 352L176.4 380.3C178.5 391.7 188.4 400 200 400L456 400C469.3 400 480 410.7 480 424C480 437.3 469.3 448 456 448L200.1 448C165.3 448 135.5 423.1 129.3 388.9L77.2 102.6C76.5 98.8 73.2 96 69.3 96L24 96C10.7 96 0 85.3 0 72zM160 528C160 501.5 181.5 480 208 480C234.5 480 256 501.5 256 528C256 554.5 234.5 576 208 576C181.5 576 160 554.5 160 528zM384 528C384 501.5 405.5 480 432 480C458.5 480 480 501.5 480 528C480 554.5 458.5 576 432 576C405.5 576 384 554.5 384 528zM336 142.4C322.7 142.4 312 153.1 312 166.4L312 200L278.4 200C265.1 200 254.4 210.7 254.4 224C254.4 237.3 265.1 248 278.4 248L312 248L312 281.6C312 294.9 322.7 305.6 336 305.6C349.3 305.6 360 294.9 360 281.6L360 248L393.6 248C406.9 248 417.6 237.3 417.6 224C417.6 210.7 406.9 200 393.6 200L360 200L360 166.4C360 153.1 349.3 142.4 336 142.4z"/></svg>
          Mua combo
        </button>
      </div>
    </div>
    {% endfor %}

  </div>

  <!-- POPUP -->
  <div class="pd-combo-popup js-pd-combo-popup" id="js-pd-combo-popup-main">
    <div class="pd-combo-popup-content" id="js-pd-combo-popup-main-content">
      <div class="pd-combo-popup-background" onclick="ComboSetVisual.modalClose();"></div>

      <div class="pd-combo-popup-inner" id="js-pd-combo-popup-main-inner">
        <!--  -->
        <div class="pd-combo-popup-sticky">
          <!--  -->
          <div class="pd-combo-popup-title">
            <h3 class="pd-combo-popup-heading">Sản phẩm được đề xuất</h3>

            <button class="pd-combo-popup-close" type="button" title="Đóng" onclick="ComboSetVisual.modalClose();">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="25" height="25" fill="#000000">
                <path d="M183.1 137.4C170.6 124.9 150.3 124.9 137.8 137.4C125.3 149.9 125.3 170.2 137.8 182.7L275.2 320L137.9 457.4C125.4 469.9 125.4 490.2 137.9 502.7C150.4 515.2 170.7 515.2 183.2 502.7L320.5 365.3L457.9 502.6C470.4 515.1 490.7 515.1 503.2 502.6C515.7 490.1 515.7 469.8 503.2 457.3L365.8 320L503.1 182.6C515.6 170.1 515.6 149.8 503.1 137.3C490.6 124.8 470.3 124.8 457.8 137.3L320.5 274.7L183.1 137.4z" />
              </svg>
            </button>
          </div>

          <!--  -->
          <form class="pd-combo-popup-search" id="js-pd-combo-popup-search" onsubmit="return false;">
            <input class="pd-combo-popup-search__input js-pd-combo-popup-filter-value" id="js-pd-combo-popup-search-input" type="text" name="q" placeholder="Bạn cần tìm sản phẩm gì?" autocomplete="off" data-key="q" data-title="Tìm kiếm theo">
            <svg class="pd-combo-popup-search__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="20" height="20" fill="#969696">
              <path d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z" />
            </svg>
          </form>

          <!--  -->
          <input type="hidden" class="js-pd-combo-popup-filter-value" id="js-pd-combo-popup-filter-price-max" data-key="max">
          <input type="hidden" class="js-pd-combo-popup-filter-value" id="js-pd-combo-popup-filter-price-min" data-key="min">

          <!--  -->
          <div class="pd-combo-popup-filter" id="js-pd-combo-popup-filter">
            <!-- Ajax holder -->
          </div>

          <!--  -->
          <div class="pd-combo-popup-sort">
            <b>Sắp xếp theo:</b>
            <button class="pd-combo-popup-sort__item new js-pd-combo-popup-sort" type="button" onclick="ComboSetVisual.modalSort(this, 'new');">
              Mới nhất
            </button>
            <button class="pd-combo-popup-sort__item price-asc js-pd-combo-popup-sort" type="button" onclick="ComboSetVisual.modalSort(this, 'price-asc');">
              Tăng dần
            </button>
            <button class="pd-combo-popup-sort__item price-desc js-pd-combo-popup-sort" type="button" onclick="ComboSetVisual.modalSort(this, 'price-desc');">
              Giảm dần
            </button>
          </div>

          <!--  -->
          <div class="pd-combo-popup-selected" id="js-pd-combo-popup-selected">
            <!-- Ajax holder -->
          </div>
        </div>

        <!--  -->
        <div class="pd-combo-popup-list" id="js-pd-combo-popup-list">
          <!-- Ajax holder -->
        </div>

        <!--  -->
        <div class="pd-combo-popup-viewmore">
          <button class="pd-combo-popup-viewmore-btn" id="js-pd-combo-popup-viewmore-btn" type="button" onclick="ComboSetVisual.modalProductMore();">
            Xem thêm
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
